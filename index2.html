<!DOCTYPE html>
<html lang="ru" data-lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiSpeak — Немецкий</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>

    <header class="header">
        <button class="header__btn header__btn--dict" id="dictBtn">
            <img src="img/book_spread_outline_28.png" alt="словарь" class="header__btn-icon">
            Словарь
        </button>

        <div class="header__select-wrap" onclick="toggleDropdown()">
            <div class="header__select">
                <span class="header__select-text" id="selectText">Выберите тему</span>
                <button class="header__select-arrow" type="button">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                        <path d="M3 5L7 9L11 5" stroke="#555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
            <ul class="header__dropdown" id="dropdownList">
                <li class="header__dropdown-item" onclick="selectTopic(this, '1. Моё любимое животное')">1. Моё любимое животное</li>
                <li class="header__dropdown-item" onclick="selectTopic(this, '2. Моя любимая еда')">2. Моя любимая еда</li>
                <li class="header__dropdown-item" onclick="selectTopic(this, '3. Моя любимая игра')">3. Моя любимая игра</li>
                <li class="header__dropdown-item" onclick="selectTopic(this, '4. Мой идеальный выходной')">4. Мой идеальный выходной</li>
                <li class="header__dropdown-item" onclick="selectTopic(this, '5. Мой любимый герой')">5. Мой любимый герой</li>
            </ul>
        </div>

        <button class="header__btn header__btn--menu" id="menuBtn">
            <img src="img/lines_3_horizontal_left_outline_28.png" alt="меню" class="header__btn-icon">
            Меню
        </button>
    </header>

    <div class="menu" id="menuPanel">
        <div class="menu__panel">
            <div class="menu__header">
                <span class="menu__title">Меню</span>
                <button class="menu__close" id="menuClose">✕</button>
            </div>
            <div class="menu__section">
                <span class="menu__label">Сложность</span>
                <div class="menu__levels">
                    <button class="menu__level menu__level--active" data-level="easy">Лёгкий</button>
                    <button class="menu__level" data-level="medium">Средний</button>
                    <button class="menu__level" data-level="hard">Сложный</button>
                </div>
            </div>
            <div class="menu__section">
                <span class="menu__label">Язык</span>
                <div class="menu__langs">
                    <button class="menu__lang" data-lang="en">🇺🇸 Английский</button>
                    <button class="menu__lang" data-lang="de">🇩🇪 Немецкий</button>
                </div>
            </div>
        </div>
    </div>

    <div class="dict" id="dictModal">
        <div class="dict__panel">
            <div class="dict__header">
                <span class="dict__title">Словарь</span>
                <button class="dict__close" id="dictClose">✕</button>
            </div>
            <div class="dict__form">
                <input class="dict__input" id="wordInput" type="text" placeholder="Слово">
                <input class="dict__input" id="transcInput" type="text" placeholder="Транскрипция">
                <button class="dict__add-btn" id="addWordBtn">Добавить</button>
            </div>
            <div class="dict__list" id="wordList"></div>
        </div>
    </div>

    <main class="main2">

        <img src="img/los5 1.png" alt="char left" class="main2__char main2__char--left">

        <div class="chat">
            <div class="chat__messages">
                <div class="chat__msg chat__msg--right">
                    <div class="chat__bubble chat__bubble--wolf">Выберите тему</div>
                    <img src="img/Mask group.png" alt="ai" class="chat__msg-avatar">
                </div>
                <div class="chat__msg chat__msg--left">
                    <img src="img/Frame 2085663352.png" alt="user" class="chat__msg-avatar">
                    <div class="chat__bubble chat__bubble--human"></div>
                </div>
            </div>

            <div class="chat__input-bar">
                <div class="chat__input-wrap">
                    <input class="chat__input" type="text" placeholder="Поиск">
                    <button class="chat__send-btn">
                        <img src="img/↳ Icon Color.png" alt="send" class="chat__send-icon">
                    </button>
                </div>
            </div>
        </div>

        <img src="img/diting_result_8b999f764fcb11f1b2c722248eda7074_1-fotor-bg-remover-2026051423557 1.png" alt="char right" class="main2__char main2__char--right">

    </main>

    <script src="js/api.js"></script>
    <script src="js/dict.js"></script>
    <script src="js/chat-page.js"></script>

</body>
</html>
